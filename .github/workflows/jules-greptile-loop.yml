name: Greptile-Jules Auto-Fix Loop

on:
  # Fires when Greptile (or anyone) submits a PR review
  pull_request_review:
    types: [submitted]

  # Fires when any commit is pushed to a non-main branch
  push:
    branches-ignore:
      - main

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Greptile reviewed → score < 4 → tag Jules
  # ──────────────────────────────────────────────
  tag-jules-on-low-score:
    name: Tag Jules if Greptile Score < 4
    if: >-
      github.event_name == 'pull_request_review' &&
      (github.event.review.user.login == 'greptile-apps[bot]' ||
       github.event.review.user.login == 'greptile-apps')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Parse score and tag Jules if below threshold
        env:
          REVIEW_BODY: ${{ github.event.review.body }}
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:   ${{ github.event.pull_request.number }}
          REPO:        ${{ github.repository }}
        run: |
          # Pull the numeric score out of "Confidence Score: N/5"
          SCORE=$(echo "$REVIEW_BODY" \
            | grep -oP '(?i)confidence score:\s*\K[0-9]+(?=\s*/\s*5)' \
            | head -1)

          echo "Greptile confidence score: ${SCORE:-not found}"

          if [ -z "$SCORE" ]; then
            echo "No score detected in review body — skipping."
            exit 0
          fi

          if [ "$SCORE" -lt 4 ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "@jules Greptile gave this PR a confidence score of **${SCORE}/5** — please review the findings below and push a fix.

          ---

          $REVIEW_BODY"
          else
            echo "Score ${SCORE}/5 meets threshold — no Jules intervention needed."
          fi

  # ──────────────────────────────────────────────
  # JOB 2: Jules pushed a fix → notify on the PR
  # ──────────────────────────────────────────────
  notify-on-jules-push:
    name: Notify PR when Jules Pushes a Fix
    if: >-
      github.event_name == 'push' &&
      (contains(github.event.head_commit.author.name, 'jules') ||
       contains(github.event.head_commit.author.email, 'jules'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Find open PR for this branch
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          BRANCH:   ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo  "$REPO"   \
            --head  "$BRANCH" \
            --state open      \
            --json  number    \
            --jq    '.[0].number // empty')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Post Jules fix notification
        if: steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          REPO:        ${{ github.repository }}
          PR_NUMBER:   ${{ steps.find-pr.outputs.pr_number }}
          COMMIT_SHA:  ${{ github.sha }}
          COMMIT_MSG:  ${{ github.event.head_commit.message }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "🤖 **Jules pushed a fix** — \`${COMMIT_SHA:0:7}\`

          > $COMMIT_MSG

          Greptile will re-review this commit automatically. If the score is still below 4/5, Jules will be tagged again."