name: Greptile-Jules Auto-Fix Loop

on:
  pull_request_review:
    types: [submitted]

jobs:
  invoke-jules-on-low-score:
    name: Invoke Jules if Greptile Score < 4
    # Only run when the reviewer is the Greptile bot
    if: >-
      github.event.review.user.login == 'greptile-apps[bot]' ||
      github.event.review.user.login == 'greptile-apps'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Parse Greptile confidence score
        id: parse
        env:
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          SCORE=$(echo "$REVIEW_BODY" \
            | grep -oP '(?i)confidence score:\s*\K[0-9]+(?=\s*/\s*5)' \
            | head -1)

          echo "Parsed score: ${SCORE:-not found}"
          echo "score=${SCORE}" >> "$GITHUB_OUTPUT"

          # Set a clean boolean so the next step's `if:` is unambiguous
          if [ -n "$SCORE" ] && [ "$SCORE" -lt 4 ]; then
            echo "should_invoke=true"  >> "$GITHUB_OUTPUT"
          else
            echo "should_invoke=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Invoke Jules to fix the issues
        if: steps.parse.outputs.should_invoke == 'true'
        uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key:      ${{ secrets.JULES_API_KEY }}
          # Tell Jules to work on the PR branch, not main
          starting_branch:    ${{ github.event.pull_request.head.ref }}
          include_last_commit: true
          prompt: |
            A Greptile automated code review gave this PR a confidence score of ${{ steps.parse.outputs.score }}/5, which is below the required threshold of 4/5.

            Your job is to read the review findings below and fix every issue that is flagged as P0 or P1. Do not change anything unrelated to the review findings.

            Rules:
            - Fix only what Greptile flagged — no scope creep
            - All existing tests must still pass after your changes
            - Keep each change minimal and surgical
            - Do not open a new PR; push your fix commits directly to the current branch: ${{ github.event.pull_request.head.ref }}

            --- GREPTILE REVIEW ---

            ${{ github.event.review.body }}